<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/png" sizes="32x32" href="Images/favicon-32x32.png">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">

        <title>Frontend Mentor | QR Code Component</title>
    </head>

    <body>
        <div class="container">
            <div>
                <img id="image" src="Images/image-qr-code.png" alt="QR Code">
            </div>

            <div class="content">
                <h3 id="main-text">Improve your front-end skills by building projects</h3>
                <p id="secondary-text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
            </div>
        </div>
    </body>
</html>
